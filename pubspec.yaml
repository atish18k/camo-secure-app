name: camo
description: "CAMO - Privacy Beyond Encryption"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.2

# ============================================================================
# Dependencies
# ============================================================================

dependencies:
  flutter:
    sdk: flutter

  # --------------------------------------------------------------------------
  # Firebase
  # --------------------------------------------------------------------------

  firebase_core: ^4.1.1
  firebase_auth: ^6.1.0
  cloud_firestore: ^6.0.2

  # --------------------------------------------------------------------------
  # State Management
  # --------------------------------------------------------------------------

  flutter_riverpod: ^3.3.2

  # --------------------------------------------------------------------------
  # Dependency Injection
  # --------------------------------------------------------------------------

  get_it: ^9.2.1

  # --------------------------------------------------------------------------
  # Security
  # --------------------------------------------------------------------------

  flutter_secure_storage: ^9.2.4
  cryptography: ^2.7.0
  local_auth: ^2.3.0

  # --------------------------------------------------------------------------
  # Local Storage
  # --------------------------------------------------------------------------

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3

  # --------------------------------------------------------------------------
  # QR
  # --------------------------------------------------------------------------

  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.2

  # --------------------------------------------------------------------------
  # Sharing
  # --------------------------------------------------------------------------

  share_plus: ^12.0.0

  # --------------------------------------------------------------------------
  # Utilities
  # --------------------------------------------------------------------------

  uuid: ^4.5.1
  connectivity_plus: ^7.0.0
  package_info_plus: ^9.0.0

  # --------------------------------------------------------------------------
  # UI
  # --------------------------------------------------------------------------

  cupertino_icons: ^1.0.8
  equatable: ^2.1.0

# ============================================================================
# Dev Dependencies
# ============================================================================

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

# ============================================================================
# Flutter
# ============================================================================

flutter:
  uses-material-design: true

